name: CI - Nivel 2

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: coindash-api/package-lock.json

      - name: Install dependencies
        working-directory: coindash-api
        run: npm ci

      - name: Run unit tests
        working-directory: coindash-api
        run: npm test

      - name: Dependency Vulnerability Scan (SCA)
        working-directory: coindash-api
        run: npm audit --audit-level=high

      - name: Build Docker image
        working-directory: coindash-api
        run: docker build -t coindash-api .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'coindash-api'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Example using secret
        run: echo "Secret configured successfully"
        env:
          API_KEY: ${{ secrets.API_KEY }}

      - name: Simulate deployment
        run: echo "Deployment successful 🚀"

